<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas 2D: Geometric Art</title>
    <link rel="icon" type="image/png" href="assets/img/panda.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-dark bg-dark shadow">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Canvas 2D </span>
            <span class="text-secondary small">Graficacion - 2026</span>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold">Panda Y Perro</h1>
            <p class="lead text-muted">Proyecto de dibujo programático con más de 30 figuras básicas.</p>
        </header>

        <div class="row g-4 align-items-center">
            <div class="col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white text-center fw-bold">Resultado Programado (JS)</div>
                    <div class="card-body p-0 d-flex justify-content-center bg-white">
                        <canvas id="myCanvas" width="500" height="500" class="img-fluid"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white text-center fw-bold">Referencia Original</div>
                    <div class="card-body p-0">
                        <img src="assets/img/PerroPanda.png" alt="Referencia" class="img-fluid w-100">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0"><strong>Pedro Said Otero</strong></p>
            <small class="text-secondary">© 2026 Graficacion</small>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
